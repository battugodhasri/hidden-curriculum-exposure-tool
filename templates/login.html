{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="glass-panel auth-box animate-fade-in">
        <h2 class="text-center mb-4">{% if admin %}Admin Login{% else %}Student Portal{% endif %}</h2>
        
        <!-- Login Form -->
        <form id="loginForm" method="POST" action="{% if admin %}{{ url_for('admin_login') }}{% else %}{{ url_for('login') }}{% endif %}" class="{% if not admin and request.args.get('mode') == 'signup' %}d-none{% endif %}" style="{% if not admin and request.args.get('mode') == 'signup' %}display: none;{% endif %}">
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
            {% if not admin %}
            <p class="text-center mt-4" style="font-size: 0.9rem;">
                New student? <a href="#" onclick="toggleMode(event)" style="color: var(--primary);">Sign Up</a>
            </p>
            {% endif %}
        </form>

        <!-- Signup Form for Students -->
        {% if not admin %}
        <form id="signupForm" method="POST" action="{{ url_for('signup') }}" style="{% if request.args.get('mode') != 'signup' %}display: none;{% endif %}">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Branch/Major</label>
                <input type="text" name="branch" required>
            </div>
            <div class="form-group">
                <label>Year of Study</label>
                <input type="number" name="year" min="1" max="5" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
            <p class="text-center mt-4" style="font-size: 0.9rem;">
                Already registered? <a href="#" onclick="toggleMode(event)" style="color: var(--primary);">Login</a>
            </p>
        </form>
        {% endif %}
    </div>
</div>

<script>
    function toggleMode(e) {
        e.preventDefault();
        const lf = document.getElementById('loginForm');
        const sf = document.getElementById('signupForm');
        if (lf.style.display === 'none') {
            lf.style.display = 'block';
            sf.style.display = 'none';
        } else {
            lf.style.display = 'none';
            sf.style.display = 'block';
        }
    }
</script>
{% endblock %}
